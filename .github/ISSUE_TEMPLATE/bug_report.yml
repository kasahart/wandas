name: Bug Report
description: Report a bug or unexpected behavior in Wandas
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much information as possible to help us reproduce and fix the issue.

        バグ報告ありがとうございます。問題の再現・修正に役立てるため、できるだけ詳しく記入してください。

  - type: textarea
    id: description
    attributes:
      label: Description / 説明
      description: A clear and concise description of the bug. / バグの内容を明確・簡潔に説明してください。
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce / 再現手順
      description: Minimal code or steps to reproduce the behavior. / 問題を再現するための最小限のコードや手順を示してください。
      render: python
      placeholder: |
        import wandas as wd

        signal = wd.read_wav("audio.wav")
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期待される動作
      description: What you expected to happen. / 本来どのような動作を期待していたか記入してください。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 実際の動作
      description: What actually happened (include full tracebacks if applicable). / 実際に起きたこと（トレースバックがある場合は全文を記入してください）。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment / 環境
      description: Please complete the following information. / 以下の情報を記入してください。
      value: |
        - OS: [e.g. Ubuntu 22.04 / Windows 11 / macOS 14]
        - Python version: [e.g. 3.11]
        - Wandas version: [e.g. 0.3.0]
        - Installation method: [e.g. pip / uv / git]
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 補足情報
      description: Any other context, screenshots, or files that may help. / その他の補足情報、スクリーンショット、関連ファイルなど。
