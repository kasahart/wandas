name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: uv をインストール
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: 依存関係をインストール
        run: uv sync --frozen --all-extras --group test

      - name: pre-commit をインストール
        run: |
          uv tool install pre-commit
          uv tool run pre-commit install --install-hooks
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
